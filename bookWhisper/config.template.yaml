# bookWhisper 配置文件模板
# 复制到家目录并修改：
#   cp config.template.yaml ~/.bookwhisper.yaml
#
# 程序启动会自动加载 ~/.bookwhisper.yaml（如果存在）。
# 也可以通过 --config 指定其他路径。

deepseek:
  # API Key，支持环境变量 ${DEEPSEEK_API_KEY}
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-v4-pro"
  base_url: "https://api.deepseek.com"
  temperature: 0.3
  max_tokens: 8192               # 单次 API 调用最大输出 token 数

chunk:
  max_chars: 15000               # 单块最大中文字符数（足够大才能去啰嗦）
  book_summary_chars: 800         # 整书摘要最大字数

output:
  dir: "./output"                # 输出目录
  suffix: "_interpreted"         # 输出文件名后缀

# 并行解读 worker 数量（默认 5）
parallel_workers: 5
